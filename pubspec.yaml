name: logistica_barraca_mvp
description: MVP offline-first para logística de barraca con Android y Web.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  file_picker: ^10.1.9
  image_picker: ^1.1.2
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  url_launcher: ^6.3.1
  geolocator: ^14.0.0
  printing: ^5.14.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_barraca_morales.png