name: logistica_barraca_mvp
description: MVP offline-first para logística de barraca con Android y Web.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  file_picker: ^10.1.9
  image_picker: ^1.1.2
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  url_launcher: ^6.3.1
  geolocator: ^14.0.0
  printing: ^5.14.2
  syncfusion_flutter_pdf: ^29.1.38
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_m_icon.png
  min_sdk_android: 21
  remove_alpha_ios: false
  web:
    generate: true
    image_path: assets/images/logo_m_icon.png
    background_color: "#006341"
    theme_color: "#006341"
  windows:
    generate: true
    image_path: assets/images/logo_m_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/images/logo_m_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_barraca_morales.png
    - assets/images/logo_barraca_morales_transparent.png
    - assets/images/logo_m_icon.png